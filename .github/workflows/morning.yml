name: Morning Cron

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  morning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run morning on all servers
        run: |
          jq -r '.[].url' config/users.json | while read url; do
            echo "Morning: $url"
            curl -sf -X POST "$url/cron/morning" \
              -H "x-cron-secret: ${{ secrets.MASTER_CRON_TOKEN }}" \
              -H "Content-Type: application/json" \
              --max-time 30 || echo "⚠ $url failed"
          done