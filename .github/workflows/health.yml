name: Health Ping

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ping all servers
        run: |
          jq -r '.[].url' config/users.json | while read url; do
            echo "Pinging $url"
            curl -sf "$url/health" || echo "⚠ $url unavailable"
          done