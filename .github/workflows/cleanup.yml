name: Weekly Cleanup

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cleanup on all servers
        run: |
          jq -r '.[].url' config/users.json | while read url; do
            echo "Cleanup: $url"
            curl -sf -X POST "$url/cron/cleanup" \
              -H "x-cron-secret: ${{ secrets.MASTER_CRON_TOKEN }}" \
              -H "Content-Type: application/json" \
              --max-time 30 || echo "⚠ $url failed"
          done