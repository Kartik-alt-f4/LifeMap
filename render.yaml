services:
  - type: web
    name: lifemap
    runtime: node
    rootDir: api
    buildCommand: npm install && cd /opt/render/project/src/web && npm install && npm run build
    startCommand: node src/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/New_York
      - key: GOOGLE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false